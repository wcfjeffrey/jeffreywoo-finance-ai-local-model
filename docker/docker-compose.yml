services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hsi-stock-predictor
    ports:
      - "5000:5000"
    volumes:
      - ../models:/app/models:rw
      - ../logs:/app/logs:rw
      - ../data:/app/data:rw
    environment:
      - MODEL_PATH=/app/models/lora_adapters/final
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s